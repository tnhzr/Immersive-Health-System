# =====================================================
#  Immersive Health System — русская локализация
# =====================================================
# Поддерживаются legacy цвета через '&' и плейсхолдеры
# вида {placeholder}. Чтобы добавить свой язык, скопируйте
# этот файл в lang/messages_<код>.yml и переключите
# параметр language в config.yml.
#
# Стилистика — Pip-Boy: преимущественно зелёные оттенки
# (&a светло-зелёный, &2 тёмно-зелёный, &7 серый,
# &8 тёмно-серый, &c красный для критических ошибок).

# Префикс приклеивается ко всем игровым сообщениям через LocaleManager#send.
# Формат FlextonPulse-стиль: «IHS &8» &7<сообщение>». Тёмно-серая стрелка не
# затрагивает следующий за ней текст — каждое сообщение само решает, какие
# цвета задать в своём теле.
prefix: "&aIHS &8» &r"

common:
  no_permission: "&cНет прав для этой команды."
  player_not_found: "&cИгрок не найден."
  only_players: "&cЭту команду может использовать только игрок."
  reload_done: "&aКонфигурация перезагружена."

ihs:
  help:
    - "&8»&a /ihs check &7<игрок|uuid> [scale|infection]"
    - "&8»&a /ihs inject &7<игрок|uuid> <id_болезни> [шанс]"
    - "&8»&a /ihs heal &7<игрок|uuid> [id_болезни]"
    - "&8»&a /ihs modify &7<игрок|uuid> <значение>"
    - "&8»&a /ihs give &7<игрок> <id_препарата> [кол-во]"
    - "&8»&a /ihs tremor &7<игрок> [сек]  &8(дебаг визуала тремора)"
    - "&8»&a /ihs menu"
    - "&8»&a /ihs reload"
    - "&8»&a /cough &7| /sneeze | /vomit  &8(требует &aihs.debug.symptom&8)"
  infection_unknown: "&cНеизвестная болезнь: &f{id}"
  medicine_unknown: "&cНеизвестный препарат: &f{id}"
  player_healthy: "&aИгрок &f{player} &7здоров."
  player_sick: "&7Игрок &f{player} &7болен — &a{infection} &7(стадия &2{stage}&7)"
  scale_view: "&7Шкала болезни игрока &f{player} &7- &a{value}"
  scale_set: "&aУстановлено значение шкалы &f{value} &aдля игрока &f{player}&a."
  injected: "&aИгрок &f{player} &aзаражён болезнью &2{infection}&a."
  injected_failed: "&7Шанс заражения не сработал."
  healed_all: "&aИгрок &f{player} &aполностью излечён."
