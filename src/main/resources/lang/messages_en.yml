# =====================================================
#  Immersive Health System — English locale
# =====================================================
# Legacy '&' colour codes and {placeholder} substitutions
# are supported. To add a custom language, copy this file
# to lang/messages_<code>.yml and switch the `language`
# entry in config.yml.
#
# Theme — Pip-Boy: dominantly green (&a light green,
# &2 dark green, &7 grey, &8 dark grey, &c reserved for
# critical errors).

# Glued to every chat message routed through LocaleManager#send.
# FlextonPulse-style format: "IHS » <message>". The dark-grey » does not
# bleed into the message body — each message decides its own colour.
prefix: "&aIHS &8» &r"

common:
  no_permission: "&cYou don't have permission to use this command."
  player_not_found: "&cPlayer not found."
  only_players: "&cThis command can only be used by a player."
  reload_done: "&aConfiguration reloaded."

ihs:
  help:
    - "&8»&a /ihs check &7<player|uuid> [scale|infection]"
    - "&8»&a /ihs inject &7<player|uuid> <infection_id> [chance]"
    - "&8»&a /ihs heal &7<player|uuid> [infection_id]"
    - "&8»&a /ihs modify &7<player|uuid> <value>"
    - "&8»&a /ihs give &7<player> <medicine_id> [count]"
    - "&8»&a /ihs tremor &7<player> [seconds]  &8(debug tremor visual)"
    - "&8»&a /ihs menu"
    - "&8»&a /ihs reload"
    - "&8»&a /cough &7| /sneeze | /vomit  &8(needs &aihs.debug.symptom&8)"
  infection_unknown: "&cUnknown infection: &f{id}"
  medicine_unknown: "&cUnknown medicine: &f{id}"
  player_healthy: "&aPlayer &f{player} &7is healthy."
  player_sick: "&7Player &f{player} &7is infected — &a{infection} &7(stage &2{stage}&7)"
  scale_view: "&7Disease scale of &f{player}&7: &a{value}"
  scale_set: "&aSet disease scale to &f{value} &afor &f{player}&a."
  injected: "&aPlayer &f{player} &awas infected with &2{infection}&a."
  injected_failed: "&7Infection roll failed."
  healed_all: "&aPlayer &f{player} &awas fully healed."
  healed_one: "&aPlayer &f{player} &awas cured of &2{infection}&a."
  give_done: "&aGave &f{count}× {medicine} &ato &f{player}&a."
  debug:
    symptom_fired: "&aFired &2{event} &aevent for &f{player}&a."

spit:
  cooldown: "&cWait &f{seconds} &cs."

medicine:
  overdose: "&cOverdose! The medicine had no effect."
  used: "&aYou consumed &f{medicine}&a."
  relief: "&aYou feel a bit better ({infection})."

